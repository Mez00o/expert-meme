<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin | Appeals Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f1113; color: white; font-family: 'Segoe UI', sans-serif; }
        .chat-pane { height: 400px; overflow-y: auto; background: #08090a; padding: 20px; border-radius: 10px; border: 1px solid #2d3238; }
        .msg-bubble { margin-bottom: 15px; padding: 12px; border-radius: 8px; background: #1a1e22; position: relative; }
        .staff-msg { border-left: 4px solid #00d4ff; }
        .internal-msg { border-left: 4px solid #ff4444; background: rgba(255, 68, 68, 0.05); }
        .msg-meta { font-size: 0.7rem; color: #666; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3>Appeal Management: <span class="text-info">Ticket #1001</span></h3>
            <button class="btn btn-outline-secondary" onclick="window.location.href='admin.html'">Back to Panel</button>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="card bg-dark text-white border-secondary">
                    <div class="card-header border-secondary fw-bold">User-Facing Chat</div>
                    <div class="card-body">
                        <div id="public-chat" class="chat-pane mb-3"></div>
                        <div class="input-group">
                            <input type="text" id="pubIn" class="form-control bg-dark text-white" placeholder="Reply to user...">
                            <button class="btn btn-info" onclick="postMessage('public')">Send</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card bg-dark text-white border-danger">
                    <div class="card-header border-danger fw-bold text-danger">Internal Staff Notes (Hidden from User)</div>
                    <div class="card-body">
                        <div id="internal-chat" class="chat-pane mb-3"></div>
                        <div class="input-group">
                            <input type="text" id="privIn" class="form-control bg-dark text-white" placeholder="Internal note...">
                            <button class="btn btn-danger" onclick="postMessage('private')">Post Note</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function postMessage(type) {
            const inputId = type === 'public' ? 'pubIn' : 'privIn';
            const storageKey = type === 'public' ? 'nh_pubMsgs' : 'nh_privMsgs';
            const input = document.getElementById(inputId);
            
            if(!input.value) return;

            const msgs = JSON.parse(localStorage.getItem(storageKey) || '[]');
            msgs.push({ text: input.value, time: new Date().toLocaleTimeString() });
            localStorage.setItem(storageKey, JSON.stringify(msgs));
            
            input.value = '';
            renderChats();
        }

        function renderChats() {
            const pubMsgs = JSON.parse(localStorage.getItem('nh_pubMsgs') || '[]');
            const privMsgs = JSON.parse(localStorage.getItem('nh_privMsgs') || '[]');

            document.getElementById('public-chat').innerHTML = pubMsgs.map(m => `
                <div class="msg-bubble staff-msg">
                    <span class="msg-meta">Staff | ${m.time}</span>
                    ${m.text}
                </div>
            `).join('');

            document.getElementById('internal-chat').innerHTML = privMsgs.map(m => `
                <div class="msg-bubble internal-msg">
                    <span class="msg-meta text-danger">INTERNAL | ${m.time}</span>
                    ${m.text}
                </div>
            `).join('');
            
            // Auto scroll to bottom
            const panes = document.querySelectorAll('.chat-pane');
            panes.forEach(p => p.scrollTop = p.scrollHeight);
        }

        renderChats();
    </script>
</body>
</html>
