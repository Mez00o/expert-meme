<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin | Appeal Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --nh-blue: #00d4ff; --nh-dark: #0a0b0c; }
        body { background-color: #0f1113; color: white; }
        .chat-pane { height: 400px; overflow-y: auto; background: #08090a; padding: 15px; border-radius: 8px; border: 1px solid #2d3238; }
        .internal-chat { border-color: #ff4444 !important; background: #1a1010; }
        .msg { margin-bottom: 10px; font-size: 0.9rem; }
        .label-staff { color: var(--nh-blue); font-weight: bold; }
        .label-internal { color: #ff4444; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container-fluid p-4">
        <h3 class="mb-4">Reviewing Appeal: <span class="text-info">User_Banned#1234</span></h3>
        
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card bg-dark text-white border-secondary">
                    <div class="card-header border-secondary fw-bold text-info">Public Chat (User can see this)</div>
                    <div class="card-body">
                        <div class="chat-pane mb-3">
                            <div class="msg text-secondary"><em>User: I'm sorry for the VDM, I've read the rules now.</em></div>
                        </div>
                        <div class="input-group">
                            <input type="text" class="form-control bg-dark text-white" placeholder="Reply to user...">
                            <button class="btn btn-info">Reply</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card bg-dark text-white border-danger">
                    <div class="card-header border-danger fw-bold text-danger">Staff Internal Notes (Private)</div>
                    <div class="card-body">
                        <div class="chat-pane internal-chat mb-3">
                            <div class="msg"><span class="label-internal">[Admin_Mez]:</span> This is his 3rd ban. I don't think we should unban yet.</div>
                            <div class="msg"><span class="label-internal">[Mod_Dan]:</span> Agreed. Let's keep him pending for 2 more days.</div>
                        </div>
                        <div class="input-group">
                            <input type="text" class="form-control bg-dark text-white" placeholder="Add internal note...">
                            <button class="btn btn-danger">Post Note</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mt-4 text-center">
            <button class="btn btn-success px-5">ACCEPT APPEAL</button>
            <button class="btn btn-danger px-5 ms-3">DENY APPEAL</button>
        </div>
    </div>
</body>
</html>
