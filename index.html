<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title">New Haven | immersive RP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --nh-blue: #00d4ff; --nh-bg: #050607; --glass: rgba(20, 22, 25, 0.8); }
        body { background-color: var(--nh-bg); color: white; font-family: 'Inter', sans-serif; }
        
        /* Glass Navbar */
        .navbar { background: var(--glass); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 212, 255, 0.2); }
        .nh-logo { font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: white; text-decoration: none; }
        .nh-logo span { color: var(--nh-blue); text-shadow: 0 0 15px var(--nh-blue); }

        /* Hero Styling */
        .hero { 
            height: 90vh; display: flex; align-items: center; justify-content: center; text-align: center;
            background: radial-gradient(circle at center, rgba(0, 212, 255, 0.05) 0%, transparent 70%), 
                        linear-gradient(rgba(0,0,0,0.6), rgba(5,6,7,1)), url('https://images.unsplash.com/photo-1605810230434-7631ac76ec81?q=80&w=2070');
            background-size: cover; background-position: center;
        }
        
        .btn-main { 
            background: var(--nh-blue); color: black; font-weight: 800; border: none; padding: 15px 40px; 
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%); transition: 0.3s;
        }
        .btn-main:hover { background: white; transform: scale(1.05); }

        .stat-badge { background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid #00ff88; padding: 5px 15px; border-radius: 4px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="nh-logo fs-3" href="index.html" id="branding-logo">NEW <span>HAVEN</span></a>
            <div class="navbar-nav ms-auto align-items-center gap-4">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="team.html">Team</a>
                <a class="nav-link" href="gallery.html">Gallery</a>
                <a class="nav-link" href="appeals.html">Appeals</a>
                <a class="btn btn-outline-info btn-sm px-4" href="applications.html">Apply</a>
                <a class="nav-link text-info fw-bold ms-3" href="admin.html">ADMIN</a>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <div class="mb-4"><span class="stat-badge" id="online-status">● SERVER ONLINE: 42 PLAYERS</span></div>
            <h1 class="display-1 fw-black mb-3" id="hero-title">NEW <span>HAVEN</span></h1>
            <p class="lead text-secondary mb-5 fs-4" id="hero-slogan">Redefining the standards of Roleplay.</p>
            <div class="d-flex justify-content-center gap-3">
                <button class="btn-main" onclick="location.href='fivem://connect/your-ip'">PLAY NOW</button>
                <button class="btn btn-outline-light px-5" onclick="location.href='https://discord.gg/'">DISCORD</button>
            </div>
        </div>
    </section>

    <script>
        function updateUI() {
            const name = localStorage.getItem('nh_name') || "NEW HAVEN";
            const slogan = localStorage.getItem('nh_slogan') || "Redefining the standards of Roleplay.";
            const split = name.split(" ");
            
            const brandHtml = `${split[0] || ''} <span>${split.slice(1).join(" ") || ''}</span>`;
            document.getElementById('branding-logo').innerHTML = brandHtml;
            document.getElementById('hero-title').innerHTML = brandHtml;
            document.getElementById('hero-slogan').innerText = slogan;
            document.title = name + " | Roleplay";
        }
        window.onload = updateUI;
    </script>
</body>
</html>
