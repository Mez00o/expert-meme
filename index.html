<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Haven RP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --nh-blue: #00d4ff; --nh-bg: #050607; --glass: rgba(15, 17, 20, 0.9); }
        body { background-color: var(--nh-bg); color: white; font-family: 'Inter', sans-serif; }
        .navbar { background: var(--glass); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 212, 255, 0.2); }
        .nh-blue { color: var(--nh-blue); text-shadow: 0 0 10px var(--nh-blue); }
        
        /* New: Faction Status Bar */
        .status-bar { background: #111418; padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.8rem; letter-spacing: 1px; }
        .dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .dot-online { background: #00ff88; box-shadow: 0 0 10px #00ff88; }

        .hero { padding: 150px 0; text-align: center; background: radial-gradient(circle at top, rgba(0, 212, 255, 0.1), transparent); }
        .news-card { background: #111418; border: 1px solid #222; border-radius: 12px; padding: 20px; transition: 0.3s; }
        .news-card:hover { border-color: var(--nh-blue); transform: translateY(-5px); }
    </style>
</head>
<body>

    <div class="status-bar text-center">
        <span class="me-4"><span class="dot dot-online"></span> LSPD: <span id="lspd-count">ACTIVE</span></span>
        <span class="me-4"><span class="dot dot-online"></span> EMS: <span id="ems-count">ACTIVE</span></span>
        <span><span class="dot dot-online"></span> MECHANIC: <span id="mech-count">OPEN</span></span>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="#">NEW <span class="nh-blue">HAVEN</span></a>
            <div class="navbar-nav ms-auto align-items-center gap-3">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="appeals.html">Appeals</a>
                <a class="nav-link" href="applications.html">Apply</a>
                <a class="btn btn-info btn-sm px-4 fw-bold" href="admin.html">ADMIN PANEL</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1 class="display-2 fw-bold mb-4">CITY <span class="nh-blue">NEWS</span></h1>
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="news-card">
                        <h4 id="news-title">Latest Update</h4>
                        <p class="text-secondary" id="news-content">Welcome to New Haven! Our server is currently live and recruiting for all departments.</p>
                        <small class="text-info">Posted by Management</small>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <script>
        window.onload = function() {
            const savedNewsTitle = localStorage.getItem('nh_newsTitle');
            const savedNewsContent = localStorage.getItem('nh_newsContent');
            if(savedNewsTitle) document.getElementById('news-title').innerText = savedNewsTitle;
            if(savedNewsContent) document.getElementById('news-content').innerText = savedNewsContent;
        }
    </script>
</body>
</html>
