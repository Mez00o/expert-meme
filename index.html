<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Haven RP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --nh-blue: #00d4ff; --nh-dark: #0a0b0c; }
        body { background-color: var(--nh-dark); color: white; font-family: 'Inter', sans-serif; }
        .navbar { background: rgba(10, 11, 12, 0.98); border-bottom: 2px solid var(--nh-blue); }
        .nh-text-blue { color: var(--nh-blue); text-shadow: 0 0 10px rgba(0, 212, 255, 0.4); }
        .hero-section { 
            padding: 180px 0; 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(10,11,12,1)), url('https://images.unsplash.com/photo-1616440347437-b1c73416efc2?q=80&w=2070'); 
            background-size: cover; background-position: center; 
        }
        .btn-nh { background-color: var(--nh-blue); color: black; font-weight: 800; border: none; padding: 12px 35px; transition: 0.3s; }
        .btn-nh:hover { background-color: white; transform: scale(1.05); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">
                <span id="nav-prefix">NEW</span> <span class="nh-text-blue" id="nav-suffix">HAVEN</span>
            </a>
            <div class="navbar-nav ms-auto align-items-center gap-3">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="appeals.html">Ban Appeal</a>
                <a class="nav-link" href="applications.html">Applications</a>
                <a class="nav-link text-info border border-info rounded px-2" href="admin.html">Admin Panel</a>
            </div>
        </div>
    </nav>

    <header class="hero-section text-center">
        <div class="container">
            <h1 class="display-1 fw-bold mb-3" id="main-title">NEW <span class="nh-text-blue">HAVEN</span></h1>
            <p class="fs-4 text-secondary mb-5" id="main-slogan">Professional Roleplay Community.</p>
            <a href="#" class="btn btn-nh">CONNECT NOW</a>
        </div>
    </header>

    <script>
        // Sync with Admin Settings
        function loadSettings() {
            const savedName = localStorage.getItem('nh_serverName') || "NEW HAVEN";
            const savedSlogan = localStorage.getItem('nh_slogan') || "Professional Roleplay Community.";
            
            document.getElementById('main-title').innerHTML = savedName.replace(" ", ' <span class="nh-text-blue">') + "</span>";
            document.getElementById('display-name') ? document.getElementById('display-name').innerText = savedName : null;
            document.getElementById('main-slogan').innerText = savedSlogan;
        }
        loadSettings();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
