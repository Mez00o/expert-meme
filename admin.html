<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NH Admin | Pro Console</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --nh-blue: #00d4ff; }
        body { background: #08090a; color: #a0a5a9; font-family: 'Segoe UI'; }
        .sidebar { width: 250px; background: #111418; height: 100vh; position: fixed; border-right: 1px solid #222; }
        .main { margin-left: 250px; padding: 40px; }
        .card-pro { background: #16191c; border: 1px solid #222; border-radius: 12px; padding: 25px; margin-bottom: 25px; }
        .nav-link { color: #666; cursor: pointer; padding: 12px; border-radius: 8px; margin-bottom: 5px; }
        .nav-link.active { background: rgba(0, 212, 255, 0.1); color: var(--nh-blue); }
        .form-control { background: #000; border: 1px solid #333; color: white; }
    </style>
</head>
<body>

    <div class="sidebar p-4">
        <h3 class="text-white fw-bold mb-5">NH <span style="color:var(--nh-blue)">PRO</span></h3>
        <div class="nav flex-column">
            <div class="nav-link active" onclick="tab('news')">Manage News</div>
            <div class="nav-link" onclick="tab('factions')">Faction Status</div>
            <div class="nav-link" onclick="tab('logs')">Staff Logs</div>
            <div class="nav-link mt-5 text-danger" onclick="location.href='index.html'">Exit</div>
        </div>
    </div>

    <div class="main">
        <div id="tab-news">
            <h2 class="text-white mb-4">Live News Feed</h2>
            <div class="card-pro">
                <label class="mb-2 small">News Headline</label>
                <input type="text" id="news-in-title" class="form-control mb-3" placeholder="Server Update v1.2">
                <label class="mb-2 small">Content</label>
                <textarea id="news-in-content" class="form-control mb-4" rows="4"></textarea>
                <button class="btn btn-info w-100 fw-bold" onclick="saveNews()">PUBLISH NEWS</button>
            </div>
        </div>

        <div id="tab-factions" style="display:none;">
            <h2 class="text-white mb-4">Department Status</h2>
            <div class="card-pro">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span>LSPD RECRUITMENT</span>
                    <button class="btn btn-sm btn-outline-success">OPEN</button>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span>EMS STATUS</span>
                    <button class="btn btn-sm btn-outline-danger">CLOSED</button>
                </div>
            </div>
        </div>

        <div id="tab-logs" style="display:none;">
            <h2 class="text-white mb-4">Action History</h2>
            <div class="card-pro">
                <table class="table table-dark table-sm">
                    <thead><tr><th>Admin</th><th>Action</th><th>Time</th></tr></thead>
                    <tbody id="log-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function tab(id) {
            ['news', 'factions', 'logs'].forEach(t => document.getElementById('tab-'+t).style.display = 'none');
            document.getElementById('tab-' + id).style.display = 'block';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.target.classList.add('active');
        }

        function saveNews() {
            const t = document.getElementById('news-in-title').value;
            const c = document.getElementById('news-in-content').value;
            localStorage.setItem('nh_newsTitle', t);
            localStorage.setItem('nh_newsContent', c);
            addLog("Updated Server News");
            alert("News Updated!");
        }

        function addLog(action) {
            const logs = JSON.parse(localStorage.getItem('nh_logs') || '[]');
            logs.push({ user: "Mez00o", action: action, time: new Date().toLocaleTimeString() });
            localStorage.setItem('nh_logs', JSON.stringify(logs));
            renderLogs();
        }

        function renderLogs() {
            const logs = JSON.parse(localStorage.getItem('nh_logs') || '[]');
            document.getElementById('log-body').innerHTML = logs.map(l => `
                <tr><td>${l.user}</td><td>${l.action}</td><td>${l.time}</td></tr>
            `).reverse().join('');
        }
        renderLogs();
    </script>
</body>
</html>
