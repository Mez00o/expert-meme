<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | FiveM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; }
        .sidebar { background-color: #1a1a1a; height: 100vh; padding: 20px; border-right: 1px solid #333; }
        .stat-card { background-color: #1e1e1e; border: 1px solid #333; padding: 20px; border-radius: 10px; }
        .nav-link { color: #bbb; }
        .nav-link:hover, .nav-link.active { color: #ff4444; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-none d-md-block sidebar">
            <h4 class="text-danger fw-bold mb-4">ADMIN</h4>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link active" href="#">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Player List</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Ban Management</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Logs</a></li>
                <li class="nav-item mt-5"><a class="nav-link text-muted" href="index.html">← Back to Site</a></li>
            </ul>
        </nav>

        <main class="col-md-10 p-5">
            <h2 class="mb-4">Server Overview</h2>
            <div class="row">
                <div class="col-md-4">
                    <div class="stat-card">
                        <h6>Total Players</h6>
                        <h2 class="text-danger">1,240</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <h6>Active Bans</h6>
                        <h2 class="text-warning">42</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <h6>Staff Online</h6>
                        <h2 class="text-success">5</h2>
                    </div>
                </div>
            </div>

            <div class="mt-5">
                <h4>Recent Actions</h4>
                <table class="table table-dark table-striped mt-3">
                    <thead>
                        <tr>
                            <th>Admin</th>
                            <th>Action</th>
                            <th>Target</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Mez00o</td>
                            <td><span class="badge bg-danger">BAN</span></td>
                            <td>BadPlayer123</td>
                            <td>2 mins ago</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
