<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | FiveM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; }
        .sidebar { background-color: #1a1a1a; min-height: 100vh; padding: 20px; border-right: 1px solid #333; }
        .stat-card { background-color: #1e1e1e; border: 1px solid #333; padding: 25px; border-radius: 12px; }
        .nav-link { color: #888; margin-bottom: 10px; cursor: pointer; }
        .nav-link:hover { color: #ff4444; background: #252525; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 sidebar">
            <h5 class="text-danger fw-bold mb-4">ADMIN</h5>
            <ul class="nav flex-column">
                <li class="nav-link" onclick="showSection('stats')">Dashboard</li>
                <li class="nav-link" onclick="showSection('forms')">Forms (Questions)</li>
                <li class="nav-link" onclick="showSection('review')">Review Apps</li>
                <li class="nav-item mt-5"><a class="nav-link text-muted" href="index.html">← Logout</a></li>
            </ul>
        </nav>

        <main class="col-md-10 p-5">
            <div id="section-stats">
                <h2 class="mb-4">Dashboard</h2>
                <div class="row g-4">
                    <div class="col-md-4"><div class="stat-card text-center"><h6>Users</h6><h2 id="user-count">1</h2></div></div>
                    <div class="col-md-4"><div class="stat-card text-center text-warning"><h6>Pending</h6><h2 id="pending-count">1</h2></div></div>
                    <div class="col-md-4"><div class="stat-card text-center text-info"><h6>Appeals</h6><h2>0</h2></div></div>
                </div>
            </div>

            <div id="section-review" style="display:none;">
                <h4>Review Applications</h4>
                <div class="table-responsive bg-dark p-3 rounded mt-3">
                    <table class="table table-dark">
                        <thead><tr><th>User</th><th>Type</th><th>Action</th></tr></thead>
                        <tbody id="app-list">
                            <tr id="row-1">
                                <td>Test_User</td>
                                <td>Staff App</td>
                                <td>
                                    <button class="btn btn-sm btn-success" onclick="processApp(1, 'Accepted')">Accept</button>
                                    <button class="btn btn-sm btn-danger" onclick="processApp(1, 'Denied')">Deny</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="section-forms" style="display:none;">
                <h4>Form Builder</h4>
                <div class="stat-card mt-3">
                    <input type="text" id="qInput" class="form-control bg-dark text-white mb-2" placeholder="Question text...">
                    <button class="btn btn-danger" onclick="addQuestion()">Add Question</button>
                    <ul id="qList" class="mt-3 list-group list-group-flush"></ul>
                </div>
            </div>
        </main>
    </div>
</div>

<script>
    function showSection(id) {
        document.getElementById('section-stats').style.display = 'none';
        document.getElementById('section-review').style.display = 'none';
        document.getElementById('section-forms').style.display = 'none';
        document.getElementById('section-' + id).style.display = 'block';
    }

    function processApp(id, status) {
        alert("Application " + status);
        document.getElementById('row-' + id).innerHTML = `<td colspan="3" class="text-center text-muted">Application ${status}</td>`;
        document.getElementById('pending-count').innerText = "0";
    }

    function addQuestion() {
        let val = document.getElementById('qInput').value;
        if(val) {
            let li = document.createElement('li');
            li.className = "list-group-item bg-transparent text-white border-secondary";
            li.innerText = val;
            document.getElementById('qList').appendChild(li);
            document.getElementById('qInput').value = "";
        }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
