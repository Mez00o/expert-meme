<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | FiveM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; }
        .sidebar { background-color: #1a1a1a; min-height: 100vh; padding: 20px; border-right: 1px solid #333; }
        .stat-card { background-color: #1e1e1e; border: 1px solid #333; padding: 25px; border-radius: 12px; }
        .nav-link { color: #888; margin-bottom: 10px; }
        .nav-link:hover, .nav-link.active { color: #ff4444; background: #252525; border-radius: 5px; }
        .form-control { background-color: #2a2a2a; border: 1px solid #444; color: white; }
        .form-control:focus { background-color: #333; color: white; border-color: #ff4444; box-shadow: none; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 sidebar d-none d-md-block">
            <h5 class="text-danger fw-bold mb-4">MANAGEMENT</h5>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link active" href="#">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="#forms">Forms (Questions)</a></li>
                <li class="nav-item"><a class="nav-link" href="#apps">Applications</a></li>
                <li class="nav-item"><a class="nav-link" href="#">User Database</a></li>
                <li class="nav-item mt-5"><a class="nav-link text-muted" href="index.html">← Back to Site</a></li>
            </ul>
        </nav>

        <main class="col-md-10 p-5">
            <h2 class="mb-4">Admin Overview</h2>
            
            <div class="row mb-5">
                <div class="col-md-4">
                    <div class="stat-card text-center">
                        <small class="text-muted text-uppercase">Total Users</small>
                        <h2 class="mt-2">0</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card text-center border-warning">
                        <small class="text-muted text-uppercase">Pending Applications</small>
                        <h2 class="mt-2 text-warning">3</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card text-center border-info">
                        <small class="text-muted text-uppercase">Pending Appeals</small>
                        <h2 class="mt-2 text-info">1</h2>
                    </div>
                </div>
            </div>

            <section id="apps" class="mb-5">
                <h4 class="mb-3">Review Pending Applications</h4>
                <div class="table-responsive bg-dark p-3 rounded">
                    <table class="table table-dark table-striped">
                        <thead>
                            <tr>
                                <th>Applicant</th>
                                <th>Type</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Officer_Hopeful</td>
                                <td>LSPD</td>
                                <td><span class="badge bg-warning text-dark">Pending</span></td>
                                <td>
                                    <button class="btn btn-sm btn-success px-3">Accept</button>
                                    <button class="btn btn-sm btn-danger px-3">Deny</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section id="forms">
                <h4 class="mb-3">Forms (Create Questions)</h4>
                <div class="stat-card">
                    <div class="mb-3">
                        <label class="form-label">Add a Question to the Application</label>
                        <input type="text" class="form-control" placeholder="Ex: Why do you want to join our staff team?">
                    </div>
                    <button class="btn btn-danger px-4">Save to Form</button>
                </div>
            </section>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
