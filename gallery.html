<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Haven | Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --nh-blue: #00d4ff; --nh-dark: #0a0b0c; }
        body { background-color: var(--nh-dark); color: white; }
        .gallery-img { 
            width: 100%; height: 250px; object-fit: cover; 
            border-radius: 10px; border: 1px solid #222;
            transition: 0.5s; cursor: pointer; filter: grayscale(40%);
        }
        .gallery-img:hover { 
            filter: grayscale(0%); transform: scale(1.03); 
            border-color: var(--nh-blue);
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold">City <span style="color: var(--nh-blue)">Snapshots</span></h1>
            <p class="text-secondary">A glimpse into daily life in New Haven.</p>
        </div>

        <div class="row g-4">
            <div class="col-md-4"><img src="https://images.unsplash.com/photo-1616440347437-b1c73416efc2" class="gallery-img"></div>
            <div class="col-md-4"><img src="https://images.unsplash.com/photo-1542751371-adc38448a05e" class="gallery-img"></div>
            <div class="col-md-4"><img src="https://images.unsplash.com/photo-1511512578047-dfb367046420" class="gallery-img"></div>
        </div>

        <div class="text-center mt-5">
            <a href="index.html" class="btn btn-outline-info">Back to Home</a>
        </div>
    </div>
</body>
</html>
