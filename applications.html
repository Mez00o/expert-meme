<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applications | FiveM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: white; }
        .app-card { background-color: #2a2a2a; border-left: 5px solid #ff4444; border-radius: 8px; margin-bottom: 20px; padding: 20px; }
        .status-badge { float: right; padding: 8px 15px; border-radius: 20px; font-weight: bold; }
        .pending { background-color: #ffc107; color: black; }
        .accepted { background-color: #198754; color: white; }
        .denied { background-color: #dc3545; color: white; }
    </style>
</head>
<body>

    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Open Applications</h2>
            <a href="index.html" class="btn btn-outline-light">Back Home</a>
        </div>

        <div class="row mb-5">
            <div class="col-md-6">
                <div class="app-card">
                    <h4>LSPD Recruitment</h4>
                    <p>Serve and protect the citizens of Los Santos.</p>
                    <button class="btn btn-danger">Apply Now</button>
                </div>
            </div>
            <div class="col-md-6">
                <div class="app-card" style="border-left-color: #0d6efd;">
                    <h4>Staff Application</h4>
                    <p>Help manage the community and server events.</p>
                    <button class="btn btn-primary">Apply Now</button>
                </div>
            </div>
        </div>

        <hr class="border-secondary">

        <h2 class="mt-5 mb-4">My Application Status</h2>
        <div class="app-card border-secondary">
            <span class="status-badge pending">PENDING</span>
            <h4>EMS Application</h4>
            <p>Submitted on: 2026-04-09</p>
        </div>

        <div class="app-card border-secondary">
            <span class="status-badge accepted">ACCEPTED</span>
            <h4>Mechanic Application</h4>
            <p>Submitted on: 2026-04-01</p>
        </div>
    </div>

</body>
</html>
