<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NH | Apply</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #050607; color: white; font-family: 'Inter'; }
        .form-card { background: #111315; border: 1px solid #222; padding: 40px; border-radius: 15px; margin-top: 50px; }
        .form-control { background: #000; border: 1px solid #333; color: white; padding: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="form-card shadow-lg">
                    <h2 class="fw-bold mb-4">Server <span class="text-info">Application</span></h2>
                    <div class="mb-3">
                        <label class="small text-muted mb-2">Discord Username</label>
                        <input type="text" id="user" class="form-control" placeholder="User#0000">
                    </div>
                    <div class="mb-3">
                        <label class="small text-muted mb-2">Desired Department</label>
                        <select id="type" class="form-control">
                            <option>Police Department</option>
                            <option>EMS / Fire</option>
                            <option>Staff Team</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="small text-muted mb-2">Why should we accept you?</label>
                        <textarea id="reason" class="form-control" rows="4"></textarea>
                    </div>
                    <button class="btn btn-info w-100 fw-bold py-3" onclick="submitApp()">SUBMIT APPLICATION</button>
                    <div class="text-center mt-4"><a href="index.html" class="text-secondary text-decoration-none">← Return Home</a></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function submitApp() {
            const app = {
                user: document.getElementById('user').value,
                type: document.getElementById('type').value,
                reason: document.getElementById('reason').value,
                status: 'Pending'
            };
            
            if(!app.user || !app.reason) return alert("Please fill in all fields.");

            let apps = JSON.parse(localStorage.getItem('nh_user_apps') || '[]');
            apps.push(app);
            localStorage.setItem('nh_user_apps', JSON.stringify(apps));

            alert("Application Submitted! Staff will review it shortly.");
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
