<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Applications | FiveM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: white; }
        .app-card { background-color: #252525; border: 1px solid #333; padding: 20px; border-radius: 10px; }
        .modal-content { background-color: #252525; color: white; border: 1px solid #ff4444; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between mb-5">
            <h2>Available <span class="text-danger">Positions</span></h2>
            <a href="index.html" class="btn btn-outline-light">Back</a>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="app-card">
                    <h4>Staff Application</h4>
                    <p class="text-muted">Help us grow the community.</p>
                    <button class="btn btn-danger w-100" data-bs-toggle="modal" data-bs-target="#appModal">Open Form</button>
                </div>
            </div>
        </div>

        <h3 class="mt-5">My Status</h3>
        <div id="user-status" class="alert alert-secondary mt-3">You have no active applications.</div>
    </div>

    <div class="modal fade" id="appModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5>Staff Application</h5></div>
                <div class="modal-body">
                    <label>Why do you want to join?</label>
                    <textarea id="appText" class="form-control bg-dark text-white border-secondary mb-3"></textarea>
                    <button class="btn btn-danger w-100" onclick="submitApp()">Submit to Admin</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function submitApp() {
            let text = document.getElementById('appText').value;
            if(text) {
                document.getElementById('user-status').className = "alert alert-warning";
                document.getElementById('user-status').innerText = "Status: PENDING (Staff Application)";
                alert("Submitted successfully!");
                bootstrap.Modal.getInstance(document.getElementById('appModal')).hide();
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
